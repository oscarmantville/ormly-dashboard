<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The ORMLY Newsletter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #0b1023;
    --navy: #141b33;
    --navy-light: #1c2544;
    --gold: #c9a84c;
    --gold-light: #e3cc7a;
    --gold-dim: rgba(201, 168, 76, 0.15);
    --gold-border: rgba(201, 168, 76, 0.35);
    --cream: #f5f0e1;
    --cream-dim: #d4cfc0;
    --ink: #1a1710;
    --green-ink: #2d7a4f;
    --green-bright: #44b875;
    --red-ink: #a83232;
    --red-bright: #d94f4f;
    --blue-steel: #6a8cba;

    --font-display: 'Bodoni Moda', 'Didot', serif;
    --font-heading: 'Playfair Display', Georgia, serif;
    --font-body: 'Libre Baskerville', Georgia, serif;
    --font-mono: 'DM Mono', 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    background: var(--midnight);
    color: var(--cream);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.65;
    padding: 36px 20px 56px;
    min-height: 100vh;
  }

  .paper {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }

  /* Gold gradient top + bottom rules */
  .paper::before,
  .paper::after {
    content: "";
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .paper::before { margin-bottom: 28px; }
  .paper::after  { margin-top: 32px; }

  /* ── MASTHEAD ─────────────────────────────────────────── */
  .masthead {
    text-align: center;
    padding: 8px 0 36px;
    animation: mastheadFadeIn 1.2s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .day-of-week {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(48px, 13vw, 96px);
    line-height: 0.92;
    color: var(--cream);
    letter-spacing: -0.025em;
    margin-bottom: 18px;
  }

  .masthead-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--cream-dim);
    text-transform: uppercase;
    padding: 12px 4px;
    border-top: 1px solid var(--gold-border);
    border-bottom: 1px solid var(--gold-border);
    margin-bottom: 22px;
  }

  .wordmark {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: clamp(22px, 4.5vw, 30px);
    color: var(--cream);
    letter-spacing: -0.015em;
    margin-bottom: 8px;
    line-height: 1.15;
  }

  .wordmark em {
    font-family: var(--font-heading);
    font-style: italic;
    font-weight: 400;
    color: var(--gold);
  }

  .tagline {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 12px;
    color: var(--cream-dim);
    margin-bottom: 26px;
    letter-spacing: 0.02em;
  }

  .double-rule {
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    height: 4px;
    margin: 0 auto;
    max-width: 240px;
  }

  /* ── TICKER STRIP ─────────────────────────────────────── */
  .ticker {
    background: var(--gold-dim);
    border-top: 1px solid var(--gold-border);
    border-bottom: 1px solid var(--gold-border);
    padding: 14px 18px;
    margin-bottom: 40px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--cream);
    display: flex;
    justify-content: space-between;
    gap: 14px 22px;
    flex-wrap: wrap;
  }

  .ticker-item {
    display: flex;
    gap: 7px;
    white-space: nowrap;
  }
  .ticker-label {
    color: var(--gold);
    text-transform: uppercase;
  }
  .ticker-value {
    color: var(--cream);
    font-weight: 500;
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }

  /* ── SECTIONS (stagger-in) ─────────────────────────────── */
  section.column {
    margin-bottom: 46px;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.8s cubic-bezier(0.2, 0.7, 0.2, 1),
                transform 0.8s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  section.column.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--gold-border);
  }

  .roman {
    font-family: var(--font-display);
    font-weight: 400;
    font-style: italic;
    font-size: 19px;
    color: var(--gold);
    letter-spacing: 0.04em;
    min-width: 34px;
  }

  .section-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: clamp(18px, 3.4vw, 21px);
    color: var(--cream);
    letter-spacing: 0.005em;
    flex: 1;
    line-height: 1.2;
  }

  .section-title em {
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
  }

  /* ── VERDICT HERO ─────────────────────────────────────── */
  .verdict {
    background: var(--cream);
    color: var(--ink);
    padding: 44px 32px 40px;
    text-align: center;
    border: 1px solid var(--gold);
    position: relative;
  }
  .verdict::before,
  .verdict::after {
    content: "";
    position: absolute;
    left: 20px;
    right: 20px;
    height: 1px;
    background: var(--gold);
  }
  .verdict::before { top: 12px; }
  .verdict::after  { bottom: 12px; }

  .verdict-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.32em;
    color: color-mix(in srgb, var(--gold) 80%, var(--ink));
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .verdict-call {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(36px, 8vw, 58px);
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.015em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .verdict-call .diamond {
    font-size: 0.42em;
    color: var(--gold);
    line-height: 1;
    transform: translateY(-0.35em);
  }

  .verdict.trade-long .verdict-call,
  .verdict.trade-short .verdict-call { color: var(--green-ink); }
  .verdict.no-trade .verdict-call    { color: var(--red-ink); }

  /* ── READINESS BAR ─────────────────────────────────────── */
  .readiness {
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .readiness-track {
    flex: 1;
    height: 3px;
    background: var(--navy-light);
    border: 1px solid var(--gold-border);
    position: relative;
    overflow: hidden;
  }
  .readiness-fill {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--gold-light), var(--gold));
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 1.4s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  section.column.visible .readiness-fill {
    transform: scaleX(var(--fill, 0));
  }
  .readiness-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--cream-dim);
    letter-spacing: 0.1em;
    text-align: right;
    text-transform: uppercase;
    min-width: 120px;
  }
  .readiness-label strong {
    display: block;
    font-family: var(--font-display);
    font-weight: 700;
    color: var(--gold);
    font-size: 22px;
    letter-spacing: -0.01em;
    margin-bottom: 2px;
    text-transform: none;
  }

  /* ── NARRATIVE (drop cap) ─────────────────────────────── */
  .narrative {
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.75;
    color: var(--cream);
    max-width: 64ch;
  }
  .narrative::first-letter {
    font-family: var(--font-display);
    font-weight: 900;
    font-style: italic;
    font-size: 72px;
    line-height: 0.82;
    color: var(--gold);
    float: left;
    padding: 6px 12px 0 0;
  }

  /* ── EDITORIAL TABLES (bias + SMT) ─────────────────────── */
  table.editorial {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-body);
  }
  table.editorial th {
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: left;
    padding: 10px 14px 10px 0;
    border-bottom: 1px solid var(--gold-border);
  }
  table.editorial td {
    padding: 15px 14px 15px 0;
    border-bottom: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
    font-size: 13px;
    color: var(--cream);
    vertical-align: baseline;
  }
  table.editorial tr:last-child td { border-bottom: none; }
  table.editorial td:last-child,
  table.editorial th:last-child { padding-right: 0; }

  .tf-col {
    font-family: var(--font-mono);
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.08em;
    width: 54px;
    white-space: nowrap;
  }

  .bias-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid;
    display: inline-block;
    white-space: nowrap;
  }
  .bias-tag.bullish { color: var(--green-bright); border-color: var(--green-ink); }
  .bias-tag.bearish { color: var(--red-bright);   border-color: var(--red-ink); }
  .bias-tag.neutral { color: var(--gold);         border-color: var(--gold-border); }

  .bias-note {
    color: var(--cream-dim);
    font-style: italic;
    font-size: 12.5px;
    line-height: 1.55;
  }

  .smt-signal {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }
  .smt-signal.bullish { color: var(--green-bright); }
  .smt-signal.bearish { color: var(--red-bright); }
  .smt-signal.none    { color: var(--cream-dim); }

  .smt-action {
    font-size: 12px;
    color: var(--cream-dim);
    line-height: 1.5;
  }

  .smt-conviction {
    margin-top: 20px;
    padding: 14px 18px;
    border: 1px solid var(--gold-border);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    color: var(--cream);
  }
  .smt-conviction.high { color: var(--green-bright); border-color: var(--green-ink); }
  .smt-conviction.low  { color: var(--red-bright);   border-color: var(--red-ink); }

  /* ── KEY LEVELS ────────────────────────────────────────── */
  .levels { display: flex; flex-direction: column; }
  .level-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 20px;
    align-items: baseline;
    padding: 15px 0;
    border-bottom: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
  }
  .level-row:last-child { border-bottom: none; }

  .level-name {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--cream);
  }
  .level-price {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    color: var(--gold-light);
    font-feature-settings: "tnum", "lnum";
    font-variant-numeric: tabular-nums lining-nums;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .level-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 4px 9px;
    border: 1px solid;
    min-width: 96px;
    text-align: center;
    white-space: nowrap;
  }
  .level-tag.resistance   { color: var(--red-bright);   border-color: var(--red-ink); }
  .level-tag.support      { color: var(--green-bright); border-color: var(--green-ink); }
  .level-tag.target       { color: var(--blue-steel);   border-color: var(--blue-steel); }
  .level-tag.swept        { color: var(--cream-dim);    border-color: var(--cream-dim); }
  .level-tag.current      { color: var(--gold);         border-color: var(--gold); }
  .level-tag.invalidation { color: var(--gold-light);   border-color: var(--gold-light); }

  /* ── CHECKLIST ─────────────────────────────────────────── */
  .checklist { display: flex; flex-direction: column; gap: 10px; }
  .check-row {
    display: grid;
    grid-template-columns: 40px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 16px;
    border: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
    background: color-mix(in srgb, var(--navy-light) 65%, transparent);
  }
  .check-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15px;
    color: var(--gold);
    line-height: 1;
  }
  .check-icon.pass    { color: var(--green-bright); border-color: var(--green-ink); }
  .check-icon.partial { color: var(--gold);         border-color: var(--gold); }
  .check-icon.fail    { color: var(--red-bright);   border-color: var(--red-ink); }
  .check-icon.na      { color: var(--cream-dim);    border-color: var(--cream-dim); }

  .check-body { min-width: 0; }
  .check-name {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 14px;
    color: var(--cream);
    margin-bottom: 3px;
    line-height: 1.25;
  }
  .check-note {
    font-family: var(--font-body);
    font-size: 11.5px;
    color: var(--cream-dim);
    font-style: italic;
    line-height: 1.5;
  }
  .check-status {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .check-status.pass    { color: var(--green-bright); }
  .check-status.partial { color: var(--gold); }
  .check-status.fail    { color: var(--red-bright); }
  .check-status.na      { color: var(--cream-dim); }

  /* ── CALENDAR ──────────────────────────────────────────── */
  .calendar { display: flex; flex-direction: column; }
  .cal-row {
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    gap: 14px;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
  }
  .cal-row:last-child { border-bottom: none; }

  .cal-when {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--gold);
    border: 1px solid var(--gold-border);
    padding: 3px 8px;
    text-transform: uppercase;
  }
  .cal-time {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--cream);
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .cal-event-wrap { min-width: 0; }
  .cal-event {
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--cream);
    line-height: 1.35;
  }
  .cal-nums {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--cream-dim);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .cal-result {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 9px;
    border: 1px solid;
    white-space: nowrap;
  }
  .cal-result.hot     { color: var(--red-bright);  border-color: var(--red-ink); }
  .cal-result.cold    { color: var(--blue-steel);  border-color: var(--blue-steel); }
  .cal-result.inline  { color: var(--cream-dim);   border-color: var(--cream-dim); }
  .cal-result.pending { color: var(--gold);        border-color: var(--gold-border); }

  .empty-state {
    padding: 28px 0;
    text-align: center;
    color: var(--cream-dim);
    font-style: italic;
    font-family: var(--font-body);
    font-size: 13px;
  }

  /* ── WATCH-FOR ─────────────────────────────────────────── */
  .watch-list { list-style: none; }
  .watch-list li {
    padding: 12px 0 12px 28px;
    position: relative;
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.65;
    color: var(--cream);
    border-bottom: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
  }
  .watch-list li:last-child { border-bottom: none; }
  .watch-list li::before {
    content: "◆";
    position: absolute;
    inset-inline-start: 0;
    top: 14px;
    color: var(--gold);
    font-size: 10px;
  }

  /* ── FOOTER ────────────────────────────────────────────── */
  .footer {
    margin-top: 60px;
    text-align: center;
    padding-top: 36px;
    border-top: 1px solid var(--gold-border);
  }

  .footer-quote {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 13px;
    color: var(--cream-dim);
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.75;
  }
  .footer-quote-author {
    display: block;
    font-family: var(--font-mono);
    font-style: normal;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 10px;
  }

  .footer-ornament {
    font-size: 14px;
    color: var(--gold);
    margin: 24px 0 22px;
    letter-spacing: 0.4em;
    cursor: default;
    transition: color 0.6s ease, letter-spacing 0.6s ease;
  }
  .footer-ornament:hover {
    color: var(--gold-light);
    letter-spacing: 0.55em;
  }

  .footer-archive {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-decoration: none;
    text-transform: uppercase;
    border-bottom: 1px solid var(--gold-border);
    padding-bottom: 3px;
    transition: color 0.3s, border-color 0.3s;
  }
  .footer-archive:hover {
    color: var(--gold-light);
    border-color: var(--gold);
  }

  .footer-meta {
    display: block;
    margin-top: 24px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--cream-dim);
    text-transform: uppercase;
  }

  /* ── ANIMATIONS ────────────────────────────────────────── */
  @keyframes mastheadFadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ────────────────────────────────────────── */
  @media (max-width: 600px) {
    body { padding: 24px 14px 36px; font-size: 13px; }

    .day-of-week { font-size: 64px; letter-spacing: -0.02em; }

    .masthead-meta {
      flex-direction: column;
      gap: 4px;
      text-align: center;
    }

    .ticker {
      font-size: 10px;
      padding: 12px 14px;
      gap: 10px 18px;
    }

    .verdict { padding: 34px 20px 30px; }
    .verdict-call { gap: 14px; }

    .narrative { font-size: 14px; }
    .narrative::first-letter { font-size: 56px; padding-right: 10px; }

    table.editorial th { font-size: 9px; }
    table.editorial td { padding: 12px 10px 12px 0; font-size: 12.5px; }
    .tf-col { width: 46px; }
    .bias-note { font-size: 11.5px; }

    .level-row {
      grid-template-columns: 1fr auto;
      gap: 6px 16px;
    }
    .level-price { font-size: 19px; }
    .level-tag { grid-column: 1 / -1; justify-self: start; min-width: 0; }

    .cal-row {
      grid-template-columns: auto auto 1fr;
      grid-template-areas:
        "when time result"
        "event event event";
      gap: 8px 12px;
    }
    .cal-when   { grid-area: when; }
    .cal-time   { grid-area: time; }
    .cal-result { grid-area: result; justify-self: end; }
    .cal-event-wrap { grid-area: event; }

    .readiness { gap: 14px; }
    .readiness-label { min-width: 96px; }
    .readiness-label strong { font-size: 18px; }
  }

  @media (max-width: 400px) {
    .paper { max-width: 100%; }
    .day-of-week { font-size: 48px; }

    .ticker { flex-direction: column; gap: 6px; }

    .check-row {
      grid-template-columns: 32px 1fr;
      gap: 10px 12px;
    }
    .check-icon { width: 28px; height: 28px; font-size: 13px; }
    .check-status { grid-column: 1 / -1; text-align: left; font-size: 9px; margin-top: -2px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .masthead { animation: none; }
    section.column {
      opacity: 1;
      transform: none;
      transition: none;
    }
    .readiness-fill { transition: none; }
    .footer-ornament { transition: none; }
  }
</style>
</head>
<body>
<div class="paper">
  <main id="root" role="main"></main>
</div>

<script>
// ============================================================
// DATA — filled by ormly-runner.sh each morning.
// Same data contract as before: bias, levels, checklist, smt,
// calendar, verdict, narrative, readiness. Only visual changes.
// ============================================================
const DATA = {

  },

  readiness: {

    label: "1 of 6 criteria"
  },

  narrative: "NQ pushed to a fresh swing high at 27,542.50 in the overnight session and is now grinding back to the lower third of today's range, currently 27,409.50 with 5m and 1m structure tilting bearish into pre-NY-open. Higher timeframes (Daily, 4H, 1H) remain bullish, so the LTF pullback is best read as a retrace inside an HTF uptrend rather than a reversal — but no SMT divergence vs ES has shown up across 1H/15m/5m/1m, so there is no edge yet. Wait for the 10:00–11:00 AM EST Silver Bullet window: a sweep of overnight low 27,344.25 followed by a 1m IFVG would be the primary long; a clean break of 27,344.25 with continuation flips the bias short.",

  bias: [
    { tf: "1D",  bias: "bullish",  note: "Daily printed a fresh high at 27,542.50 above prior daily H 27,462.50; structure is higher highs / higher lows, no MSS down." },
    { tf: "4H",  bias: "bullish",  note: "4H rallied 938 pts off 26,440 to 27,542.50 with no lower low; current bar is a shallow pullback inside the trend." },
    { tf: "1H",  bias: "bullish",  note: "1H still in uptrend (close 27,394 vs open 26,926, +1.74%) but consolidating below 27,500 — pullback in progress, not a reversal." },
    { tf: "15m", bias: "bearish",  note: "15m made successive lower highs from 27,540 → 27,482 → 27,467 → 27,437 → 27,433; actively grinding into the session low." },
    { tf: "5m",  bias: "bearish",  note: "5m printed lower lows down to 27,385.75, structure is HRLR sell-side delivery from 27,500." },
    { tf: "1m",  bias: "bearish",  note: "1m sweeping the session lows, last 5 bars stair-stepping down 27,426 → 27,409 → 27,405 → 27,393 → 27,385.75." }
  ],

  levels: [
    { price: "27,542.50", name: "Overnight / Daily High",          tag: "resistance" },
    { price: "27,462.50", name: "Friday PDH",                      tag: "swept" },
    { price: "27,443.38", name: "Today's Range Equilibrium (50%)", tag: "target" },
    { price: "27,435.00", name: "Friday Settlement",               tag: "resistance" },
    { price: "27,409.50", name: "Current Price",                   tag: "current" },
    { price: "27,385.75", name: "Session Low (5m)",                tag: "support" },
    { price: "27,344.25", name: "Overnight Low",                   tag: "support" },
    { price: "26,992.00", name: "Friday PDL",                      tag: "invalidation" }
  ],

  checklist: [
    { step: 1, name: "Bias confirmed",                status: "partial", note: "Daily/4H/1H bullish but 15m/5m/1m bearish pullback — top-down split, not yet aligned." },
    { step: 2, name: "Liquidity sweep",               status: "fail",    note: "ONH 27,542.50 was swept overnight, but no clean 5m/1m sweep at the execution-relevant level (ONL 27,344.25) yet." },
    { step: 3, name: "Displacement + MSS on 1m",      status: "fail",    note: "1m is grinding lower in stair-steps — no displacement candle, no shift back up." },
    { step: 4, name: "IFVG identified",               status: "fail",    note: "No FVG-then-violation sequence on 1m yet; no IFVG marked." },
    { step: 5, name: "Entry at CE of IFVG",           status: "na",      note: "No IFVG → no CE entry zone." },
    { step: 6, name: "Min 1:1 R:R to next DOL",       status: "na",      note: "Cannot measure without an entry; nearest upside DOL is ONH 27,542.50 (+150 pts), downside DOL is ONL 27,344.25 (-65 pts)." }
  ],

  smt: [
    { tf: "1H",  nq_action: "Pulled back from 27,542.50 to 27,394 — no recent swing low taken.", es_action: "Pulled back from 7,208.50 to 7,183.50 — no recent swing low taken.",          signal: "No SMT" },
    { tf: "15m", nq_action: "Stair-stepping toward 15m low 27,388 (now 27,392).",                  es_action: "Stair-stepping toward 15m low 7,181.50 (now 7,184.50).",                       signal: "No SMT" },
    { tf: "5m",  nq_action: "Tagged 5m low 27,385.75 — fresh low printed.",                        es_action: "Tagged 5m low 7,183.25 — fresh low printed.",                                  signal: "No SMT (both swept together — continuation lower)" },
    { tf: "1m",  nq_action: "1m low 27,385.75 just hit on current bar.",                           es_action: "1m low 7,183.25 hit ~3 bars ago, currently 7,184.25.",                          signal: "No SMT (both indices in lockstep at lows)" }
  ],
  smt_conviction: "NEUTRAL",

  calendar: [],
  calendar_empty_note: "No high-impact USD events scheduled — clean session today and tomorrow.",

  next_high_impact: "none in next 48h",

  verdict: {
    call: "NO TRADE",
    watch_for: [
      "Sweep of Overnight Low 27,344.25 followed by 1m displacement back above it — long the IFVG at CE for return to range eq 27,443 / ONH 27,542.50.",
      "Bearish SMT vs ES on 5m or 1m at the lows — NQ undercuts 27,344.25 while ES holds 7,181.50 — would invert and become a HIGH-CONVICTION long.",
      "Clean break and 5m close below 27,344.25 with continuation — flips bias short toward Friday settlement 27,435 retest from below / PDL 26,992.",
      "Reclaim of 27,443 range eq inside the 10:00–11:00 AM EST window — long continuation back to ONH 27,542.50 if bullish HTF reasserts."
    ]
  }
};

// Footer quotes — one is picked per render
const FOOTER_QUOTES = [
  { t: "The market can stay irrational longer than you can stay solvent.", a: "John Maynard Keynes" },
  { t: "Every battle is won before it is ever fought.", a: "Sun Tzu" },
  { t: "Price is what you pay. Value is what you get.", a: "Benjamin Graham" },
  { t: "Markets are never wrong — opinions are.", a: "Jesse Livermore" },
  { t: "The four most dangerous words in investing are 'this time it's different.'", a: "Sir John Templeton" },
  { t: "In the short run the market is a voting machine. In the long run, it is a weighing machine.", a: "Benjamin Graham" },
  { t: "Patience is bitter, but its fruit is sweet.", a: "Aristotle" },
  { t: "Risk comes from not knowing what you are doing.", a: "Warren Buffett" }
];

// ============================================================
// RENDER HELPERS
// ============================================================
function el(tag, attrs = {}, children = []) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else n.setAttribute(k, v);
  }
  if (!Array.isArray(children)) children = [children];
  for (const c of children) {
    if (c == null) continue;
    n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return n;
}

function safeText(v, fallback = "—") {
  if (v == null) return fallback;
  const s = String(v);
  if (!s || s.startsWith("__")) return fallback;
  return s;
}

// ============================================================
// DERIVATIONS from DATA.session_date
// ============================================================
function parseSessionDate(s) {
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  return new Date(Date.UTC(Number(m[1]), Number(m[2]) - 1, Number(m[3])));
}

function dayOfWeek(sessionDate) {
  const dt = parseSessionDate(sessionDate);
  if (!dt) return "SESSION";
  const names = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
  return names[dt.getUTCDay()];
}

function formattedDate(sessionDate) {
  const dt = parseSessionDate(sessionDate);
  if (!dt) return safeText(sessionDate);
  const months = [
    "JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE",
    "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"
  ];
  return `${months[dt.getUTCMonth()]} ${dt.getUTCDate()}, ${dt.getUTCFullYear()}`;
}

function issueNumber(sessionDate) {
  // Days since 2026-01-01 (volume I starts at NO. 001 on that day)
  const dt = parseSessionDate(sessionDate);
  if (!dt) return "001";
  const epoch = Date.UTC(2026, 0, 1);
  const days = Math.max(1, Math.floor((dt.getTime() - epoch) / 86400000) + 1);
  return String(days).padStart(3, "0");
}

// ============================================================
// RENDERERS
// ============================================================
function renderMasthead() {
  const day = dayOfWeek(DATA.session_date);
  const dateLine = formattedDate(DATA.session_date);
  const issue = issueNumber(DATA.session_date);

  return el("header", { class: "masthead" }, [
    el("div", { class: "eyebrow" }, `\u25C6  VOL. I  \u00B7  NO. ${issue}  \u00B7  EST. 2026  \u25C6`),
    el("h1", { class: "day-of-week" }, day),
    el("div", { class: "masthead-meta" }, [
      el("span", {}, dateLine),
      el("span", {}, `GENERATED ${safeText(DATA.generated)}`)
    ]),
    el("div", { class: "wordmark", html: "ORMLY's <em>Daily Newsletter</em>" }),
    el("div", { class: "tagline" }, "Silver Bullet Intelligence \u00B7 Pre-Session Brief"),
    el("div", { class: "double-rule" })
  ]);
}

function renderTicker() {
  const items = [
    { label: "Symbol",    value: safeText(DATA.symbol) },
    { label: "Price",     value: safeText(DATA.ticker && DATA.ticker.price) },
    { label: "High",      value: safeText(DATA.ticker && DATA.ticker.high) },
    { label: "Low",       value: safeText(DATA.ticker && DATA.ticker.low) },
    { label: "Generated", value: safeText(DATA.generated) }
  ];
  return el("div", { class: "ticker", role: "complementary", "aria-label": "Market snapshot" },
    items.map(i =>
      el("div", { class: "ticker-item" }, [
        el("span", { class: "ticker-label" }, `${i.label}:`),
        el("span", { class: "ticker-value" }, i.value)
      ])
    )
  );
}

function makeSection(roman, titleHtml, body) {
  return el("section", { class: "column" }, [
    el("div", { class: "section-head" }, [
      el("span", { class: "roman" }, roman),
      el("h2", { class: "section-title", html: titleHtml })
    ]),
    body
  ]);
}

function renderVerdict() {
  const call = safeText(DATA.verdict && DATA.verdict.call, "NO TRADE");
  let cls = "no-trade";
  if (/LONG/i.test(call))       cls = "trade-long";
  else if (/SHORT/i.test(call)) cls = "trade-short";

  const body = el("div", { class: `verdict ${cls}`, "aria-label": `Verdict: ${call}` }, [
    el("div", { class: "verdict-label" }, "Today's Verdict"),
    el("div", { class: "verdict-call" }, [
      el("span", { class: "diamond", "aria-hidden": "true" }, "\u25C6"),
      el("span", {}, call),
      el("span", { class: "diamond", "aria-hidden": "true" }, "\u25C6")
    ])
  ]);
  return makeSection("I.", "The <em>Verdict</em>", body);
}

function renderReadiness() {
  const pct = Math.max(0, Math.min(100, Number(DATA.readiness && DATA.readiness.score) || 0));
  const label = safeText(DATA.readiness && DATA.readiness.label, "");
  const body = el("div", { class: "readiness", style: `--fill:${pct / 100}` }, [
    el("div", { class: "readiness-track" }, [
      el("div", {
        class: "readiness-fill",
        role: "progressbar",
        "aria-valuenow": String(pct),
        "aria-valuemin": "0",
        "aria-valuemax": "100",
        "aria-label": `Setup readiness: ${pct}%`
      })
    ]),
    el("div", { class: "readiness-label", html: `<strong>${pct}%</strong>${label ? label : ""}` })
  ]);
  return makeSection("II.", "Setup <em>Readiness</em>", body);
}

function renderNarrative() {
  const body = el("p", { class: "narrative" }, safeText(DATA.narrative, ""));
  return makeSection("III.", "Session <em>Narrative</em>", body);
}

function renderBias() {
  const rows = DATA.bias.map(b =>
    el("tr", {}, [
      el("td", { class: "tf-col" }, b.tf),
      el("td", {}, [el("span", { class: `bias-tag ${b.bias}` }, b.bias)]),
      el("td", { class: "bias-note" }, safeText(b.note, ""))
    ])
  );
  const table = el("table", { class: "editorial" }, [
    el("thead", {}, el("tr", {}, [
      el("th", {}, "TF"),
      el("th", {}, "Bias"),
      el("th", {}, "Observation")
    ])),
    el("tbody", {}, rows)
  ]);
  return makeSection("IV.", "Top-Down <em>Bias</em>", table);
}

function renderSMT() {
  const children = [];
  if (!DATA.smt || DATA.smt.length === 0) {
    children.push(el("div", { class: "empty-state" }, "No SMT divergence data available."));
  } else {
    const rows = DATA.smt.map(s => {
      const cls = /bullish/i.test(s.signal) ? "bullish"
                : /bearish/i.test(s.signal) ? "bearish"
                : "none";
      return el("tr", {}, [
        el("td", { class: "tf-col" }, s.tf),
        el("td", { class: "smt-action" }, safeText(s.nq_action, "")),
        el("td", { class: "smt-action" }, safeText(s.es_action, "")),
        el("td", {}, [el("span", { class: `smt-signal ${cls}` }, safeText(s.signal, ""))])
      ]);
    });
    children.push(el("table", { class: "editorial" }, [
      el("thead", {}, el("tr", {}, [
        el("th", {}, "TF"),
        el("th", {}, "NQ Action"),
        el("th", {}, "ES Action"),
        el("th", {}, "Signal")
      ])),
      el("tbody", {}, rows)
    ]));
  }
  const conv = safeText(DATA.smt_conviction, "");
  if (conv) {
    let cls = "neutral";
    if (/high/i.test(conv))     cls = "high";
    else if (/low/i.test(conv)) cls = "low";
    children.push(el("div", { class: `smt-conviction ${cls}` }, `Conviction \u00B7 ${conv}`));
  }
  return makeSection("V.", "SMT <em>Divergence</em> (NQ vs ES)", el("div", {}, children));
}

function renderLevels() {
  let body;
  if (!DATA.levels || DATA.levels.length === 0) {
    body = el("div", { class: "empty-state" }, "No levels marked.");
  } else {
    body = el("div", { class: "levels" }, DATA.levels.map(l =>
      el("div", { class: "level-row" }, [
        el("div", { class: "level-name" }, safeText(l.name, "")),
        el("div", { class: "level-price" }, safeText(l.price, "")),
        el("div", { class: `level-tag ${l.tag || "current"}` }, safeText(l.tag, ""))
      ])
    ));
  }
  return makeSection("VI.", "Key <em>Levels</em>", body);
}

function renderChecklist() {
  const iconMap  = { pass: "\u2713", partial: "\u223C", fail: "\u2715", na: "\u00B7" };
  const labelMap = { pass: "Pass", partial: "Partial", fail: "Fail", na: "Not applicable" };

  const rows = DATA.checklist.map(c =>
    el("div", { class: "check-row" }, [
      el("div", {
        class: `check-icon ${c.status}`,
        role: "img",
        "aria-label": labelMap[c.status] || "Unknown"
      }, iconMap[c.status] || "\u00B7"),
      el("div", { class: "check-body" }, [
        el("div", { class: "check-name" }, `${c.step}. ${c.name}`),
        el("div", { class: "check-note" }, safeText(c.note, ""))
      ]),
      el("div", { class: `check-status ${c.status}`, "aria-hidden": "true" }, c.status)
    ])
  );
  return makeSection("VII.", "Entry <em>Checklist</em>", el("div", { class: "checklist", role: "list" }, rows));
}

function renderCalendar() {
  let body;
  if (!DATA.calendar || DATA.calendar.length === 0) {
    body = el("div", { class: "empty-state" }, safeText(DATA.calendar_empty_note, "No red-folder USD events."));
  } else {
    body = el("div", { class: "calendar" }, DATA.calendar.map(ev => {
      const result = ev.result || "pending";
      const whenRaw = (ev.when || "today").toString().toUpperCase();
      return el("div", { class: "cal-row" }, [
        el("div", { class: "cal-when" }, whenRaw),
        el("div", { class: "cal-time" }, safeText(ev.time_est, "")),
        el("div", { class: "cal-event-wrap" }, [
          el("div", { class: "cal-event" }, safeText(ev.event, "")),
          el("div", { class: "cal-nums" },
            `Fcst ${safeText(ev.forecast, "—")}  \u00B7  Prev ${safeText(ev.previous, "—")}  \u00B7  Act ${safeText(ev.actual, "—")}`)
        ]),
        el("div", { class: `cal-result ${result}` }, result)
      ]);
    }));
  }
  return makeSection("VIII.", "Red-Folder <em>Calendar</em> (USD)", body);
}

function renderWatchFor() {
  const items = ((DATA.verdict && DATA.verdict.watch_for) || [])
    .filter(w => w && !String(w).startsWith("__"));
  const body = items.length
    ? el("ul", { class: "watch-list" }, items.map(w => el("li", {}, w)))
    : el("div", { class: "empty-state" }, "Nothing specific to watch.");
  return makeSection("IX.", "Watch <em>For</em>", body);
}

function renderFooter() {
  const q = FOOTER_QUOTES[Math.floor(Math.random() * FOOTER_QUOTES.length)];
  return el("footer", { class: "footer" }, [
    el("div", { class: "footer-quote" }, [
      el("span", {}, `\u201C${q.t}\u201D`),
      el("span", { class: "footer-quote-author" }, `\u2014 ${q.a}`)
    ]),
    el("div", { class: "footer-ornament", "aria-hidden": "true" }, "\u25C6  \u25C7  \u25C6"),
    el("a", {
      class: "footer-archive",
      href: "https://github.com/oscarmantville/ormly-dashboard/tree/main/archive"
    }, "Read the Archive"),
    el("span", { class: "footer-meta" },
      `ORMLY  \u00B7  ${safeText(DATA.session_date)}  \u00B7  Silver Bullet 10:00\u201311:00 AM EST`)
  ]);
}

// ============================================================
// MOUNT
// ============================================================
function render() {
  const root = document.getElementById("root");
  root.appendChild(renderMasthead());
  root.appendChild(renderTicker());
  root.appendChild(renderVerdict());
  root.appendChild(renderReadiness());
  root.appendChild(renderNarrative());
  root.appendChild(renderBias());
  root.appendChild(renderSMT());
  root.appendChild(renderLevels());
  root.appendChild(renderChecklist());
  root.appendChild(renderCalendar());
  root.appendChild(renderWatchFor());
  root.appendChild(renderFooter());

  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const sections = document.querySelectorAll('section.column');

  if (prefersReduced || !('IntersectionObserver' in window)) {
    sections.forEach(s => s.classList.add('visible'));
    return;
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        const idx = Array.prototype.indexOf.call(sections, entry.target);
        setTimeout(() => entry.target.classList.add('visible'), Math.max(0, idx) * 70);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  sections.forEach(s => observer.observe(s));
}

render();
</script>
