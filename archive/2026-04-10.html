<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The ORMLY Newsletter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #0b1023;
    --navy: #141b33;
    --navy-light: #1c2544;
    --gold: #c9a84c;
    --gold-light: #e3cc7a;
    --gold-dim: rgba(201, 168, 76, 0.15);
    --gold-border: rgba(201, 168, 76, 0.35);
    --cream: #f5f0e1;
    --cream-dim: #d4cfc0;
    --ink: #1a1710;
    --green-ink: #2d7a4f;
    --green-bright: #44b875;
    --red-ink: #a83232;
    --red-bright: #d94f4f;
    --blue-steel: #6a8cba;

    --font-display: 'Bodoni Moda', 'Didot', serif;
    --font-heading: 'Playfair Display', Georgia, serif;
    --font-body: 'Libre Baskerville', Georgia, serif;
    --font-mono: 'DM Mono', 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    background: var(--midnight);
    color: var(--cream);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.65;
    padding: 36px 20px 56px;
    min-height: 100vh;
  }

  .paper {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }

  .paper::before,
  .paper::after {
    content: "";
    display: block;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .paper::before { margin-bottom: 28px; }
  .paper::after  { margin-top: 32px; }

  .masthead {
    text-align: center;
    padding: 8px 0 36px;
    animation: mastheadFadeIn 1.2s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .day-of-week {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(48px, 13vw, 96px);
    line-height: 0.92;
    color: var(--cream);
    letter-spacing: -0.025em;
    margin-bottom: 18px;
  }

  .masthead-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--cream-dim);
    text-transform: uppercase;
    padding: 12px 4px;
    border-top: 1px solid var(--gold-border);
    border-bottom: 1px solid var(--gold-border);
    margin-bottom: 22px;
  }

  .wordmark {
    font-family: var(--font-heading);
    font-weight: 800;
    font-size: clamp(22px, 4.5vw, 30px);
    color: var(--cream);
    letter-spacing: -0.015em;
    margin-bottom: 8px;
    line-height: 1.15;
  }

  .wordmark em {
    font-family: var(--font-heading);
    font-style: italic;
    font-weight: 400;
    color: var(--gold);
  }

  .tagline {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 12px;
    color: var(--cream-dim);
    margin-bottom: 26px;
    letter-spacing: 0.02em;
  }

  .double-rule {
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    height: 4px;
    margin: 0 auto;
    max-width: 240px;
  }

  .ticker {
    background: var(--gold-dim);
    border-top: 1px solid var(--gold-border);
    border-bottom: 1px solid var(--gold-border);
    padding: 14px 18px;
    margin-bottom: 40px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--cream);
    display: flex;
    justify-content: space-between;
    gap: 14px 22px;
    flex-wrap: wrap;
  }

  .ticker-item { display: flex; gap: 7px; white-space: nowrap; }
  .ticker-label { color: var(--gold); text-transform: uppercase; }
  .ticker-value {
    color: var(--cream);
    font-weight: 500;
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }

  section.column {
    margin-bottom: 46px;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.8s cubic-bezier(0.2, 0.7, 0.2, 1),
                transform 0.8s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  section.column.visible { opacity: 1; transform: translateY(0); }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--gold-border);
  }

  .roman {
    font-family: var(--font-display);
    font-weight: 400;
    font-style: italic;
    font-size: 19px;
    color: var(--gold);
    letter-spacing: 0.04em;
    min-width: 34px;
  }

  .section-title {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: clamp(18px, 3.4vw, 21px);
    color: var(--cream);
    letter-spacing: 0.005em;
    flex: 1;
    line-height: 1.2;
  }

  .section-title em {
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
  }

  .verdict {
    background: var(--cream);
    color: var(--ink);
    padding: 44px 32px 40px;
    text-align: center;
    border: 1px solid var(--gold);
    position: relative;
  }
  .verdict::before, .verdict::after {
    content: "";
    position: absolute;
    left: 20px;
    right: 20px;
    height: 1px;
    background: var(--gold);
  }
  .verdict::before { top: 12px; }
  .verdict::after  { bottom: 12px; }

  .verdict-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.32em;
    color: color-mix(in srgb, var(--gold) 80%, var(--ink));
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .verdict-call {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(36px, 8vw, 58px);
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.015em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .verdict-call .diamond {
    font-size: 0.42em;
    color: var(--gold);
    line-height: 1;
    transform: translateY(-0.35em);
  }

  .verdict.trade-long .verdict-call,
  .verdict.trade-short .verdict-call { color: var(--green-ink); }
  .verdict.no-trade .verdict-call    { color: var(--red-ink); }

  .readiness { display: flex; align-items: center; gap: 22px; }
  .readiness-track {
    flex: 1;
    height: 3px;
    background: var(--navy-light);
    border: 1px solid var(--gold-border);
    position: relative;
    overflow: hidden;
  }
  .readiness-fill {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--gold-light), var(--gold));
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 1.4s cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  section.column.visible .readiness-fill { transform: scaleX(var(--fill, 0)); }
  .readiness-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--cream-dim);
    letter-spacing: 0.1em;
    text-align: right;
    text-transform: uppercase;
    min-width: 120px;
  }
  .readiness-label strong {
    display: block;
    font-family: var(--font-display);
    font-weight: 700;
    color: var(--gold);
    font-size: 22px;
    letter-spacing: -0.01em;
    margin-bottom: 2px;
    text-transform: none;
  }

  .narrative {
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.75;
    color: var(--cream);
    max-width: 64ch;
  }
  .narrative::first-letter {
    font-family: var(--font-display);
    font-weight: 900;
    font-style: italic;
    font-size: 72px;
    line-height: 0.82;
    color: var(--gold);
    float: left;
    padding: 6px 12px 0 0;
  }

  table.editorial { width: 100%; border-collapse: collapse; font-family: var(--font-body); }
  table.editorial th {
    font-family: var(--font-mono);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: left;
    padding: 10px 14px 10px 0;
    border-bottom: 1px solid var(--gold-border);
  }
  table.editorial td {
    padding: 15px 14px 15px 0;
    border-bottom: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
    font-size: 13px;
    color: var(--cream);
    vertical-align: baseline;
  }
  table.editorial tr:last-child td { border-bottom: none; }
  table.editorial td:last-child, table.editorial th:last-child { padding-right: 0; }

  .tf-col {
    font-family: var(--font-mono);
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.08em;
    width: 54px;
    white-space: nowrap;
  }

  .bias-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid;
    display: inline-block;
    white-space: nowrap;
  }
  .bias-tag.bullish { color: var(--green-bright); border-color: var(--green-ink); }
  .bias-tag.bearish { color: var(--red-bright);   border-color: var(--red-ink); }
  .bias-tag.neutral { color: var(--gold);         border-color: var(--gold-border); }

  .bias-note {
    color: var(--cream-dim);
    font-style: italic;
    font-size: 12.5px;
    line-height: 1.55;
  }

  .smt-signal {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }
  .smt-signal.bullish { color: var(--green-bright); }
  .smt-signal.bearish { color: var(--red-bright); }
  .smt-signal.none    { color: var(--cream-dim); }

  .smt-action { font-size: 12px; color: var(--cream-dim); line-height: 1.5; }

  .smt-conviction {
    margin-top: 20px;
    padding: 14px 18px;
    border: 1px solid var(--gold-border);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    color: var(--cream);
  }
  .smt-conviction.high { color: var(--green-bright); border-color: var(--green-ink); }
  .smt-conviction.low  { color: var(--red-bright);   border-color: var(--red-ink); }

  .levels { display: flex; flex-direction: column; }
  .level-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 20px;
    align-items: baseline;
    padding: 15px 0;
    border-bottom: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
  }
  .level-row:last-child { border-bottom: none; }

  .level-name { font-family: var(--font-body); font-size: 13px; color: var(--cream); }
  .level-price {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    color: var(--gold-light);
    font-feature-settings: "tnum", "lnum";
    font-variant-numeric: tabular-nums lining-nums;
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .level-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 4px 9px;
    border: 1px solid;
    min-width: 96px;
    text-align: center;
    white-space: nowrap;
  }
  .level-tag.resistance   { color: var(--red-bright);   border-color: var(--red-ink); }
  .level-tag.support      { color: var(--green-bright); border-color: var(--green-ink); }
  .level-tag.target       { color: var(--blue-steel);   border-color: var(--blue-steel); }
  .level-tag.swept        { color: var(--cream-dim);    border-color: var(--cream-dim); }
  .level-tag.current      { color: var(--gold);         border-color: var(--gold); }
  .level-tag.invalidation { color: var(--gold-light);   border-color: var(--gold-light); }

  .checklist { display: flex; flex-direction: column; gap: 10px; }
  .check-row {
    display: grid;
    grid-template-columns: 40px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 16px;
    border: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
    background: color-mix(in srgb, var(--navy-light) 65%, transparent);
  }
  .check-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15px;
    color: var(--gold);
    line-height: 1;
  }
  .check-icon.pass    { color: var(--green-bright); border-color: var(--green-ink); }
  .check-icon.partial { color: var(--gold);         border-color: var(--gold); }
  .check-icon.fail    { color: var(--red-bright);   border-color: var(--red-ink); }
  .check-icon.na      { color: var(--cream-dim);    border-color: var(--cream-dim); }

  .check-body { min-width: 0; }
  .check-name {
    font-family: var(--font-heading);
    font-weight: 700;
    font-size: 14px;
    color: var(--cream);
    margin-bottom: 3px;
    line-height: 1.25;
  }
  .check-note {
    font-family: var(--font-body);
    font-size: 11.5px;
    color: var(--cream-dim);
    font-style: italic;
    line-height: 1.5;
  }
  .check-status {
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .check-status.pass    { color: var(--green-bright); }
  .check-status.partial { color: var(--gold); }
  .check-status.fail    { color: var(--red-bright); }
  .check-status.na      { color: var(--cream-dim); }

  .calendar { display: flex; flex-direction: column; }
  .cal-row {
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    gap: 14px;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
  }
  .cal-row:last-child { border-bottom: none; }

  .cal-when {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--gold);
    border: 1px solid var(--gold-border);
    padding: 3px 8px;
    text-transform: uppercase;
  }
  .cal-time {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--cream);
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .cal-event-wrap { min-width: 0; }
  .cal-event { font-family: var(--font-body); font-size: 13px; color: var(--cream); line-height: 1.35; }
  .cal-nums {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--cream-dim);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .cal-result {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 9px;
    border: 1px solid;
    white-space: nowrap;
  }
  .cal-result.hot     { color: var(--red-bright);  border-color: var(--red-ink); }
  .cal-result.cold    { color: var(--blue-steel);  border-color: var(--blue-steel); }
  .cal-result.inline  { color: var(--cream-dim);   border-color: var(--cream-dim); }
  .cal-result.pending { color: var(--gold);        border-color: var(--gold-border); }

  .empty-state {
    padding: 28px 0;
    text-align: center;
    color: var(--cream-dim);
    font-style: italic;
    font-family: var(--font-body);
    font-size: 13px;
  }

  .watch-list { list-style: none; }
  .watch-list li {
    padding: 12px 0 12px 28px;
    position: relative;
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.65;
    color: var(--cream);
    border-bottom: 1px solid color-mix(in srgb, var(--gold) 16%, transparent);
  }
  .watch-list li:last-child { border-bottom: none; }
  .watch-list li::before {
    content: "◆";
    position: absolute;
    inset-inline-start: 0;
    top: 14px;
    color: var(--gold);
    font-size: 10px;
  }

  .footer {
    margin-top: 60px;
    text-align: center;
    padding-top: 36px;
    border-top: 1px solid var(--gold-border);
  }
  .footer-quote {
    font-family: var(--font-body);
    font-style: italic;
    font-size: 13px;
    color: var(--cream-dim);
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.75;
  }
  .footer-quote-author {
    display: block;
    font-family: var(--font-mono);
    font-style: normal;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 10px;
  }
  .footer-ornament {
    font-size: 14px;
    color: var(--gold);
    margin: 24px 0 22px;
    letter-spacing: 0.4em;
    cursor: default;
    transition: color 0.6s ease, letter-spacing 0.6s ease;
  }
  .footer-ornament:hover { color: var(--gold-light); letter-spacing: 0.55em; }
  .footer-archive {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-decoration: none;
    text-transform: uppercase;
    border-bottom: 1px solid var(--gold-border);
    padding-bottom: 3px;
    transition: color 0.3s, border-color 0.3s;
  }
  .footer-archive:hover { color: var(--gold-light); border-color: var(--gold); }
  .footer-meta {
    display: block;
    margin-top: 24px;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--cream-dim);
    text-transform: uppercase;
  }

  @keyframes mastheadFadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    body { padding: 24px 14px 36px; font-size: 13px; }
    .day-of-week { font-size: 64px; letter-spacing: -0.02em; }
    .masthead-meta { flex-direction: column; gap: 4px; text-align: center; }
    .ticker { font-size: 10px; padding: 12px 14px; gap: 10px 18px; }
    .verdict { padding: 34px 20px 30px; }
    .verdict-call { gap: 14px; }
    .narrative { font-size: 14px; }
    .narrative::first-letter { font-size: 56px; padding-right: 10px; }
    table.editorial th { font-size: 9px; }
    table.editorial td { padding: 12px 10px 12px 0; font-size: 12.5px; }
    .tf-col { width: 46px; }
    .bias-note { font-size: 11.5px; }
    .level-row { grid-template-columns: 1fr auto; gap: 6px 16px; }
    .level-price { font-size: 19px; }
    .level-tag { grid-column: 1 / -1; justify-self: start; min-width: 0; }
    .cal-row {
      grid-template-columns: auto auto 1fr;
      grid-template-areas: "when time result" "event event event";
      gap: 8px 12px;
    }
    .cal-when { grid-area: when; }
    .cal-time { grid-area: time; }
    .cal-result { grid-area: result; justify-self: end; }
    .cal-event-wrap { grid-area: event; }
    .readiness { gap: 14px; }
    .readiness-label { min-width: 96px; }
    .readiness-label strong { font-size: 18px; }
  }

  @media (max-width: 400px) {
    .paper { max-width: 100%; }
    .day-of-week { font-size: 48px; }
    .ticker { flex-direction: column; gap: 6px; }
    .check-row { grid-template-columns: 32px 1fr; gap: 10px 12px; }
    .check-icon { width: 28px; height: 28px; font-size: 13px; }
    .check-status { grid-column: 1 / -1; text-align: left; font-size: 9px; margin-top: -2px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .masthead { animation: none; }
    section.column { opacity: 1; transform: none; transition: none; }
    .readiness-fill { transition: none; }
    .footer-ornament { transition: none; }
  }
</style>
</head>
<body>
<div class="paper">
  <main id="root" role="main"></main>
</div>

<script>
const DATA = {
  generated: "6:41 PM EST, 2026-04-10",
  session_date: "2026-04-10",
  symbol: "CME_MINI:NQ1!",

  ticker: {
    price: "25,333.00",
    high:  "25,393.00",
    low:   "25,203.00"
  },

  readiness: {
    score: 33,
    label: "2 of 6 criteria"
  },

function el(tag, attrs = {}, children = []) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else n.setAttribute(k, v);
  }
  if (!Array.isArray(children)) children = [children];
  for (const c of children) {
    if (c == null) continue;
    n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return n;
}

function safeText(v, fallback = "—") {
  if (v == null) return fallback;
  const s = String(v);
  if (!s || s.startsWith("__")) return fallback;
  return s;
}

function parseSessionDate(s) {
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  return new Date(Date.UTC(Number(m[1]), Number(m[2]) - 1, Number(m[3])));
}

function dayOfWeek(sessionDate) {
  const dt = parseSessionDate(sessionDate);
  if (!dt) return "SESSION";
  const names = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
  return names[dt.getUTCDay()];
}

function formattedDate(sessionDate) {
  const dt = parseSessionDate(sessionDate);
  if (!dt) return safeText(sessionDate);
  const months = [
    "JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE",
    "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"
  ];
  return `${months[dt.getUTCMonth()]} ${dt.getUTCDate()}, ${dt.getUTCFullYear()}`;
}

function issueNumber(sessionDate) {
  const dt = parseSessionDate(sessionDate);
  if (!dt) return "001";
  const epoch = Date.UTC(2026, 0, 1);
  const days = Math.max(1, Math.floor((dt.getTime() - epoch) / 86400000) + 1);
  return String(days).padStart(3, "0");
}

function renderMasthead() {
  const day = dayOfWeek(DATA.session_date);
  const dateLine = formattedDate(DATA.session_date);
  const issue = issueNumber(DATA.session_date);

  return el("header", { class: "masthead" }, [
    el("div", { class: "eyebrow" }, `\u25C6  VOL. I  \u00B7  NO. ${issue}  \u00B7  EST. 2026  \u25C6`),
    el("h1", { class: "day-of-week" }, day),
    el("div", { class: "masthead-meta" }, [
      el("span", {}, dateLine),
      el("span", {}, `GENERATED ${safeText(DATA.generated)}`)
    ]),
    el("div", { class: "wordmark", html: "ORMLY's <em>Daily Newsletter</em>" }),
    el("div", { class: "tagline" }, "Silver Bullet Intelligence \u00B7 Pre-Session Brief"),

function renderTicker() {

    { label: "Low",       value: safeText(DATA.ticker && DATA.ticker.low) },

    items.map(i =>

function makeSection(roman, titleHtml, body) {
  return el("section", { class: "column" }, [

function renderVerdict() {

  else if (/SHORT/i.test(call)) cls = "trade-short";

  const body = el("div", { class: `verdict ${cls}`, "aria-label": `Verdict: ${call}` }, [
    el("div", { class: "verdict-label" }, "Today's Verdict"),
    el("div", { class: "verdict-call" }, [

      el("span", {}, call),

  return makeSection("V.", "SMT <em>Divergence</em> (NQ vs ES)", el("div", {}, children));
}

function render() {
  const root = document.getElementById("root");

  root.appendChild(renderTicker());

  root.appendChild(renderNarrative());
  root.appendChild(renderBias());
  root.appendChild(renderSMT());
  root.appendChild(renderLevels());
  root.appendChild(renderChecklist());
  root.appendChild(renderCalendar());
  root.appendChild(renderWatchFor());
  root.appendChild(renderFooter());

  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const sections = document.querySelectorAll('section.column');

  if (prefersReduced || !('IntersectionObserver' in window)) {
    sections.forEach(s => s.classList.add('visible'));
    return;
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        const idx = Array.prototype.indexOf.call(sections, entry.target);
        setTimeout(() => entry.target.classList.add('visible'), Math.max(0, idx) * 70);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  sections.forEach(s => observer.observe(s));
}

render();
