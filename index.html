<title>The ORMLY Newsletter</title>
<style>
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-400-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-600-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-700-normal.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 800;
    font-display: swap;
    src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-800-normal.woff2') format('woff2');
  }
  :root {
    --bg: oklch(0.13 0.005 60);
    --panel: oklch(0.16 0.005 60);
    --panel-2: oklch(0.19 0.005 60);
    --border: oklch(0.26 0.005 60);
    --text: oklch(0.92 0.008 60);
    --muted: oklch(0.58 0.01 60);
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --accent: oklch(0.72 0.11 60);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 24px 16px;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .header { text-align: left; padding: 24px 20px; }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 6px;
  }
  .header .sub {
    color: var(--muted);
    font-size: 12px;
  }
  h2.section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 0 0 12px 0;
  }
  /* Readiness bar */
  .readiness { display: flex; align-items: center; gap: 12px; }
  .bar-track {
    flex: 1;
    height: 8px;
    background: var(--panel-2);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .bar-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
    transform-origin: left;
    transition: transform 0.3s ease-out;
  }
  .bar-label { font-weight: 700; font-size: 13px; min-width: 68px; text-align: right; }
  /* Narrative */
  .narrative { color: var(--text); font-size: 13px; line-height: 1.6; max-width: 70ch; }
  /* Bias grid */
  .bias-grid { display: flex; flex-direction: column; gap: 4px; }
  .bias-row {
    display: grid;
    grid-template-columns: 60px 90px 1fr;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    background: var(--panel-2);
    align-items: center;
  }
  .bias-row.bullish { background: color-mix(in oklch, var(--green) 6%, var(--panel-2)); }
  .bias-row.bearish { background: color-mix(in oklch, var(--red) 6%, var(--panel-2)); }
  .bias-row.neutral { background: color-mix(in oklch, var(--yellow) 6%, var(--panel-2)); }
  .bias-tf { font-weight: 700; color: var(--text); }
  .bias-tag {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 3px;
    text-align: center;
  }
  .bias-tag.bullish { background: color-mix(in oklch, var(--green) 15%, transparent); color: var(--green); }
  .bias-tag.bearish { background: color-mix(in oklch, var(--red) 15%, transparent); color: var(--red); }
  .bias-tag.neutral { background: color-mix(in oklch, var(--yellow) 15%, transparent); color: var(--yellow); }
  .bias-note { color: var(--muted); font-size: 12px; min-width: 0; overflow-wrap: break-word; }
  /* Levels table */
  table.levels { width: 100%; border-collapse: collapse; }
  table.levels th, table.levels td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  table.levels th {
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.08em;
  }
  table.levels td.price { font-weight: 700; color: var(--text); }
  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 3px;
  }
  .tag.resistance { background: color-mix(in oklch, var(--red) 15%, transparent); color: var(--red); }
  .tag.support { background: color-mix(in oklch, var(--green) 15%, transparent); color: var(--green); }
  .tag.target { background: color-mix(in oklch, var(--blue) 15%, transparent); color: var(--blue); }
  .tag.swept { background: color-mix(in oklch, var(--muted) 15%, transparent); color: var(--muted); }
  .tag.current { background: color-mix(in oklch, var(--accent) 15%, transparent); color: var(--accent); }
  .tag.invalidation { background: color-mix(in oklch, var(--yellow) 15%, transparent); color: var(--yellow); }
  /* Checklist */
  .checklist { display: flex; flex-direction: column; gap: 6px; }
  .check-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 12px;
    padding: 10px 12px;
    background: var(--panel-2);
    border-radius: 6px;
    align-items: center;
  }
  .check-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .check-icon.pass { background: color-mix(in oklch, var(--green) 20%, transparent); color: var(--green); }
  .check-icon.partial { background: color-mix(in oklch, var(--yellow) 20%, transparent); color: var(--yellow); }
  .check-icon.fail { background: color-mix(in oklch, var(--red) 20%, transparent); color: var(--red); }
  .check-icon.na { background: color-mix(in oklch, var(--muted) 20%, transparent); color: var(--muted); }
  .check-name { font-weight: 600; font-size: 12px; }
  .check-note { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .check-status {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .check-status.pass { color: var(--green); }
  .check-status.partial { color: var(--yellow); }
  .check-status.fail { color: var(--red); }
  .check-status.na { color: var(--muted); }
  /* Calendar */
  .cal-row {
    display: grid;
    grid-template-columns: 80px 1fr auto auto;
    gap: 10px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    align-items: center;
  }
  .cal-nums { color: var(--muted); white-space: pre; font-size: 10px; letter-spacing: 0.02em; }
  .cal-row:last-child { border-bottom: none; }
  .cal-row.header-row {
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.08em;
  }
  .cal-time { color: var(--accent); font-weight: 700; }
  .cal-event { color: var(--text); font-weight: 600; }
  .cal-empty { color: var(--muted); padding: 12px; text-align: center; font-style: italic; }
  .tag.hot { background: color-mix(in oklch, var(--red) 15%, transparent); color: var(--red); }
  .tag.cold { background: color-mix(in oklch, var(--blue) 15%, transparent); color: var(--blue); }
  .tag.inline { background: color-mix(in oklch, var(--muted) 15%, transparent); color: var(--muted); }
  .tag.pending { background: color-mix(in oklch, var(--yellow) 15%, transparent); color: var(--yellow); }
  /* Verdict */
  .verdict {
    padding: 22px 24px;
    border-radius: 8px;
    border: 1px solid;
    text-align: center;
  }
  .verdict.no-trade { background: color-mix(in oklch, var(--red) 8%, transparent); border-color: color-mix(in oklch, var(--red) 35%, transparent); }
  .verdict.trade { background: color-mix(in oklch, var(--green) 8%, transparent); border-color: color-mix(in oklch, var(--green) 35%, transparent); }
  .verdict-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--muted); margin-bottom: 8px;
  }
  .verdict-call {
    font-size: 28px; font-weight: 800; letter-spacing: -0.01em;
    margin-bottom: 14px;
  }
  .verdict.no-trade .verdict-call { color: var(--red); }
  .verdict.trade .verdict-call { color: var(--green); }
  .verdict-watch { text-align: left; margin-top: 12px; }
  .verdict-watch-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 8px;
  }
  .verdict-watch ul { list-style: none; }
  .verdict-watch li {
    padding: 5px 0; font-size: 12px; color: var(--text);
    padding-inline-start: 14px; position: relative;
  }
  .verdict-watch li:before { content: "\2192"; position: absolute; inset-inline-start: 0; color: var(--accent); }
  /* SMT Divergence */
  .smt-grid { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
  .smt-row td, .smt-row th {
    padding: 10px 12px;
    font-size: 12px;
    text-align: left;
  }
  .smt-row td {
    background: var(--panel-2);
  }
  .smt-row td:first-child { border-radius: 6px 0 0 6px; }
  .smt-row td:last-child { border-radius: 0 6px 6px 0; }
  .smt-row.header-row th {
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.08em;
    background: transparent;
  }
  .smt-tf { font-weight: 700; color: var(--text); }
  .smt-action { color: var(--muted); overflow-wrap: break-word; }
  .smt-signal { font-weight: 700; font-size: 11px; }
  .smt-signal.bullish { color: var(--green); }
  .smt-signal.bearish { color: var(--red); }
  .smt-signal.none { color: var(--muted); }
  .smt-conviction {
    margin-top: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    background: var(--panel-2);
    font-size: 12px;
    font-weight: 700;
    text-align: center;
  }
  .smt-conviction.high { color: var(--green); border: 1px solid color-mix(in oklch, var(--green) 30%, transparent); }
  .smt-conviction.low { color: var(--red); border: 1px solid color-mix(in oklch, var(--red) 30%, transparent); }
  .smt-conviction.neutral { color: var(--yellow); border: 1px solid color-mix(in oklch, var(--yellow) 30%, transparent); }
  /* Footer */
  .footer {
    text-align: center; color: var(--muted); font-size: 10px;
    padding: 20px 0 8px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .footer-links {
    margin-top: 8px;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: none;
  }
  .footer-links a {
    color: var(--accent);
    text-decoration: none;
    transition: opacity 0.2s ease;
  }
  .footer-links a:hover { opacity: 0.7; }
  .footer-links a:focus-visible { outline: 1px solid var(--accent); outline-offset: 2px; }
  /* Last updated timestamp */
  .last-updated {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }
  /* Fade-in on load */
  .card, .verdict, .footer {
    opacity: 0;
    transform: translateY(6px);
    animation: fadeIn 0.4s ease forwards;
  }
  .card:nth-child(1) { animation-delay: 0s; }
  .card:nth-child(2) { animation-delay: 0.04s; }
  .card:nth-child(3) { animation-delay: 0.08s; }
  .card:nth-child(4) { animation-delay: 0.12s; }
  .card:nth-child(5) { animation-delay: 0.16s; }
  .card:nth-child(6) { animation-delay: 0.2s; }
  .card:nth-child(7) { animation-delay: 0.24s; }
  .card:nth-child(8) { animation-delay: 0.28s; }
  .card:nth-child(9) { animation-delay: 0.32s; }
  .footer { animation-delay: 0.36s; }
  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .bar-fill { transition: none; }
    .card, .verdict, .footer {
      animation: none;
      opacity: 1;
      transform: none;
    }
  }

  /* Mobile: stack grids, increase readability */
  @media (max-width: 600px) {
    body { font-size: 13px; padding: 16px 10px; }
    .bias-row {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .bias-row .bias-tf { display: inline; }
    .bias-row .bias-tag { display: inline-block; width: auto; }
    .bias-row .bias-note { font-size: 11px; }
    table.levels thead { display: none; }
    table.levels tbody tr {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    table.levels td {
      display: block;
      border-bottom: none;
      padding: 0;
      font-size: 12px;
    }
    table.levels td.price {
      flex-basis: 100%;
      font-size: 14px;
    }
    .smt-grid thead { display: none; }
    .smt-row { display: block; }
    .smt-row td {
      display: block;
      border-radius: 0;
      padding: 4px 12px;
    }
    .smt-row td:first-child {
      border-radius: 6px 6px 0 0;
      padding-top: 10px;
    }
    .smt-row td:last-child {
      border-radius: 0 0 6px 6px;
      padding-bottom: 10px;
    }
    .smt-signal { font-size: 12px; }
    .cal-row.header-row { display: none; }
    .cal-row {
      grid-template-columns: auto 1fr auto;
      gap: 4px 10px;
      padding: 10px 0;
    }
    .cal-nums { grid-column: 1 / -1; font-size: 10px; }
    .check-row {
      grid-template-columns: 24px 1fr auto;
      gap: 8px;
      padding: 8px 10px;
    }
    .verdict-call { font-size: 22px; }
    .verdict { padding: 18px 16px; }
  }

  /* Extra-narrow (375px and below) */
  @media (max-width: 400px) {
    body { padding: 12px 8px; }
    .card { padding: 14px 12px; }
    .header { padding: 16px 12px; }
    .header h1 { font-size: 18px; }
    .readiness { flex-direction: column; gap: 6px; align-items: stretch; }
    .bar-label { text-align: left; min-width: unset; font-size: 12px; }
    .verdict-call { font-size: 20px; }
    .bias-note { font-size: 11px; line-height: 1.4; }
    .smt-action { font-size: 11px; }
  }
</style>

// ============================================================
// RENDERER
// ============================================================
function el(tag, attrs = {}, children = []) {
  const n = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "class") n.className = v;
    else if (k === "html") n.innerHTML = v;
    else n.setAttribute(k, v);
  }
  if (!Array.isArray(children)) children = [children];
  for (const c of children) {
    if (c == null) continue;
    n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return n;
}

}

function renderReadiness() {
  const pct = Math.max(0, Math.min(100, DATA.readiness.score));
  return el("section", { class: "card" }, [
    el("h2", { class: "section-title" }, "Setup Readiness"),
    el("div", { class: "readiness" }, [
      el("div", { class: "bar-track", role: "progressbar", "aria-valuenow": String(pct), "aria-valuemin": "0", "aria-valuemax": "100", "aria-label": `Setup readiness: ${pct}%` }, [
        el("div", { class: "bar-fill", style: `transform:scaleX(${pct / 100})` })
      ]),
      el("div", { class: "bar-label", "aria-hidden": "true" }, `${pct}% \u00b7 ${DATA.readiness.label}`)
    ])
  ]);
}

function renderNarrative() {
  return el("section", { class: "card" }, [
    el("h2", { class: "section-title" }, "Session Narrative"),
    el("p", { class: "narrative" }, DATA.narrative)
  ]);
}

function renderBias() {
  const rows = DATA.bias.map(b =>
    el("div", { class: `bias-row ${b.bias}`, role: "listitem" }, [
      el("div", { class: "bias-tf" }, b.tf),
      el("div", { class: `bias-tag ${b.bias}` }, b.bias),
      el("div", { class: "bias-note" }, b.note)
    ])
  );
  return el("section", { class: "card" }, [
    el("h2", { class: "section-title" }, "Top-Down Bias"),
    el("div", { class: "bias-grid", role: "list", "aria-label": "Bias by timeframe" }, rows)
  ]);
}

function renderLevels() {
  const thead = el("tr", {}, [
    el("th", {}, "Price"),
    el("th", {}, "Level"),
    el("th", {}, "Type")
  ]);
  const rows = DATA.levels.length === 0
    ? [el("tr", {}, [el("td", { colspan: "3", class: "cal-empty" }, "No levels marked.")])]
    : DATA.levels.map(l =>
        el("tr", {}, [
          el("td", { class: "price" }, l.price),
          el("td", {}, l.name),
          el("td", {}, [el("span", { class: `tag ${l.tag}` }, l.tag)])
        ])
      );
  return el("section", { class: "card" }, [
    el("h2", { class: "section-title" }, "Key Levels"),
    el("table", { class: "levels" }, [
      el("thead", {}, thead),
      el("tbody", {}, rows)
    ])
  ]);
}

function renderSMT() {
  const thead = el("thead", {}, [
    el("tr", { class: "smt-row header-row" }, [
      el("th", {}, "TF"),
      el("th", {}, "NQ Action"),
      el("th", {}, "ES Action"),
      el("th", {}, "SMT Signal")
    ])
  ]);
  let tbody;
  if (DATA.smt.length === 0) {
    tbody = el("tbody", {}, [
      el("tr", {}, [el("td", { colspan: "4", class: "cal-empty" }, "No SMT data available.")])
    ]);
  } else {
    tbody = el("tbody", {}, DATA.smt.map(s => {
      const cls = /bullish/i.test(s.signal) ? "bullish" : /bearish/i.test(s.signal) ? "bearish" : "none";
      return el("tr", { class: "smt-row" }, [
        el("td", { class: "smt-tf" }, s.tf),
        el("td", { class: "smt-action" }, s.nq_action),
        el("td", { class: "smt-action" }, s.es_action),
        el("td", { class: `smt-signal ${cls}` }, s.signal)
      ]);
    }));
  }
  const children = [
    el("h2", { class: "section-title" }, "SMT Divergence Check (NQ vs ES)"),
    el("table", { class: "smt-grid" }, [thead, tbody])
  ];
  if (DATA.smt_conviction && !DATA.smt_conviction.startsWith("__")) {
    const convCls = /high/i.test(DATA.smt_conviction) ? "high" : /low/i.test(DATA.smt_conviction) ? "low" : "neutral";
    children.push(el("div", { class: `smt-conviction ${convCls}` }, `SMT Conviction: ${DATA.smt_conviction}`));
  }
  return el("section", { class: "card" }, children);
}

function renderChecklist() {
  const iconMap = { pass: "\u2713", partial: "~", fail: "\u2717", na: "\u00b7" };
  const labelMap = { pass: "Pass", partial: "Partial", fail: "Fail", na: "Not applicable" };
  const rows = DATA.checklist.map(c =>
    el("div", { class: "check-row", role: "listitem" }, [
      el("div", { class: `check-icon ${c.status}`, "aria-label": labelMap[c.status] || "Unknown", role: "img" }, iconMap[c.status] || "\u00b7"),
      el("div", {}, [
        el("div", { class: "check-name" }, `${c.step}. ${c.name}`),
        el("div", { class: "check-note" }, c.note)
      ]),
      el("div", { class: `check-status ${c.status}`, "aria-hidden": "true" }, c.status)
    ])
  );
  return el("section", { class: "card" }, [
    el("h2", { class: "section-title" }, "6-Step Entry Checklist"),
    el("div", { class: "checklist", role: "list", "aria-label": "Entry checklist" }, rows)
  ]);
}

function renderCalendar() {
  const body = el("div", {});
  if (DATA.calendar.length === 0) {
    body.appendChild(el("div", { class: "cal-empty" }, DATA.calendar_empty_note));
  } else {
    body.appendChild(el("div", { class: "cal-row header-row" }, [
      el("div", {}, "Time"),
      el("div", {}, "Event"),
      el("div", {}, "Fcst / Prev / Act"),
      el("div", {}, "")
    ]));
    for (const ev of DATA.calendar) {
      const result = ev.result || "pending";
      body.appendChild(el("div", { class: "cal-row" }, [
        el("div", { class: "cal-time" }, ev.time_est),
        el("div", { class: "cal-event" }, ev.event),
        el("div", { class: "cal-nums" }, `F ${ev.forecast || "\u2014"}  P ${ev.previous || "\u2014"}  A ${ev.actual || "\u2014"}`),
        el("div", {}, [el("span", { class: `tag ${result}` }, result)])
      ]));
    }
  }
  return el("section", { class: "card" }, [
    el("h2", { class: "section-title" }, "High-Impact USD Calendar (EST)"),
    body
  ]);
}

function renderVerdict() {
  const isNoTrade = /NO TRADE/i.test(DATA.verdict.call);
  const cls = isNoTrade ? "no-trade" : "trade";
  const children = [
    el("div", { class: "verdict-label" }, "Verdict"),
    el("div", { class: "verdict-call" }, DATA.verdict.call)
  ];
  if (DATA.verdict.watch_for && DATA.verdict.watch_for.length) {
    const ul = el("ul", {}, DATA.verdict.watch_for.map(w => el("li", {}, w)));
    children.push(el("div", { class: "verdict-watch" }, [
      el("div", { class: "verdict-watch-title" }, "Watch for"),
      ul
    ]));
  }
  return el("section", { class: `card verdict ${cls}`, "aria-label": `Verdict: ${DATA.verdict.call}` }, children);
}

function renderFooter() {
  const footer = el("footer", { class: "footer" }, [
    document.createTextNode(`ORMLY \u00b7 ${DATA.session_date} \u00b7 Silver Bullet 10:00 AM EST \u2013 11:00 AM EST`),
    el("div", { class: "footer-links" }, [
      el("a", { href: "https://github.com/oscarmantville/ormly-dashboard/tree/main/archive" }, "View archive \u2192")
    ])
  ]);
  return footer;
}

function render() {
  const root = document.getElementById("root");
  root.appendChild(renderHeader());
  root.appendChild(renderReadiness());
  root.appendChild(renderNarrative());
  root.appendChild(renderBias());
  root.appendChild(renderLevels());
  root.appendChild(renderSMT());
  root.appendChild(renderChecklist());
  root.appendChild(renderCalendar());
  root.appendChild(renderVerdict());
  root.appendChild(renderFooter());
}

render();
</script>
</body>
</html>
